name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm compile

      - run: pnpm test

      - run: pnpm build

      - name: Upload built extension as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kazakh-script-helper-chrome-mv3
          path: .output/chrome-mv3/
          retention-days: 14
          if-no-files-found: error
      # web-ext lint deferred — its checks target Firefox compatibility
      # (browser_specific_settings.gecko.id, scripts fallback for the
      # service worker), which v2.0 doesn't ship. Re-enable when the
      # Firefox build lands.
